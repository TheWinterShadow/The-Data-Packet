name: Deploy Documentation

on:
    workflow_run:
        workflows: ["Python Build"]
        types:
            - completed
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build-docs:
        name: "Build Documentation"
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install Documentation Dependencies
              run: pip install zensical mkdocstrings[python] mkdocs-material

            - name: Build Zensical site
              run: zensical build

            - name: Copy coverage report
              run: |
                  if [ -d "htmlcov" ]; then
                    mkdir -p site/coverage
                    cp -r htmlcov/* site/coverage/
                    echo "Coverage report copied to site/coverage/"
                  else
                    echo "No coverage report found (run tests first to generate one)"
                  fi

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "site"

    deploy-docs:
        name: "Deploy to GitHub Pages"
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build-docs
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
